<svg width="854" height="200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="z-index:1;position:relative" viewBox="0 0 854 200">
  <style>
    /* 全体共通テキストスタイル */
    .typewriter-group {
      font-family: "Courier New", Courier, Monaco, Consolas, monospace;
      font-size: 50px;
      font-weight: 700;
      fill: #ffffff;
    }

    /* 全選択（Ctrl+A）時の青背景スタイル */
    .selection-bg {
      fill: #0078d7;
    }

    /* カーソルの常時点滅アニメーション */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor-line {
      stroke: #ffffff;
      stroke-width: 4;
      animation: blink 0.7s infinite;
    }

    /* 全体の時間軸を14.5秒（14500ms）に変更
      タイピング完了後、13.5秒まで10秒間キープ。
      13.5秒〜14.0秒（約93.1%〜96.5%）でCtrl+A（全選択：青背景）。
      14.0秒〜14.5秒（約96.5%〜100%）でDelete（一括削除：空白）。
    */
    @keyframes step-flow-0  { 0% { display: inline; } 0.68% { display: none; } 100% { display: none; } }
    @keyframes step-flow-1  { 0%, 0.67% { display: none; } 0.68% { display: inline; } 1.37% { display: none; } 100% { display: none; } }
    @keyframes step-flow-2  { 0%, 1.36% { display: none; } 1.37% { display: inline; } 2.06% { display: none; } 100% { display: none; } }
    @keyframes step-flow-3  { 0%, 2.05% { display: none; } 2.06% { display: inline; } 2.75% { display: none; } 100% { display: none; } }
