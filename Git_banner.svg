    @keyframes step-flow-5  { 0%, 3.43% { display: none; } 3.44% { display: inline; } 4.13% { display: none; } 100% { display: none; } }
    @keyframes step-flow-6  { 0%, 4.12% { display: none; } 4.13% { display: inline; } 4.82% { display: none; } 100% { display: none; } }
    @keyframes step-flow-7  { 0%, 4.81% { display: none; } 4.82% { display: inline; } 5.51% { display: none; } 100% { display: none; } }
    @keyframes step-flow-8  { 0%, 5.50% { display: none; } 5.51% { display: inline; } 6.20% { display: none; } 100% { display: none; } }
    @keyframes step-flow-9  { 0%, 6.19% { display: none; } 6.20% { display: inline; } 6.89% { display: none; } 100% { display: none; } }
    @keyframes step-flow-10 { 0%, 6.88% { display: none; } 6.89% { display: inline; } 7.58% { display: none; } 100% { display: none; } }
    @keyframes step-flow-11 { 0%, 7.57% { display: none; } 7.58% { display: inline; } 8.27% { display: none; } 100% { display: none; } }
