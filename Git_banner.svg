    @keyframes step-flow-21 { 0%, 14.47% { display: none; } 14.48% { display: inline; } 15.17% { display: none; } 100% { display: none; } }
    @keyframes step-flow-22 { 0%, 15.16% { display: none; } 15.17% { display: inline; } 15.86% { display: none; } 100% { display: none; } }
    @keyframes step-flow-23 { 0%, 15.85% { display: none; } 15.86% { display: inline; } 16.55% { display: none; } 100% { display: none; } }
