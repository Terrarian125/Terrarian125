    @keyframes step-flow-27 { 0%, 18.61% { display: none; } 18.62% { display: inline; } 19.31% { display: none; } 100% { display: none; } }
    @keyframes step-flow-28 { 0%, 19.30% { display: none; } 19.31% { display: inline; } 20.00% { display: none; } 100% { display: none; } }
    @keyframes step-flow-29 { 0%, 19.99% { display: none; } 20.00% { display: inline; } 20.69% { display: none; } 100% { display: none; } }
    @keyframes step-flow-30 { 0%, 20.68% { display: none; } 20.69% { display: inline; } 21.37% { display: none; } 100% { display: none; } }
    @keyframes step-flow-31 { 0%, 21.36% { display: none; } 21.37% { display: inline; } 22.06% { display: none; } 100% { display: none; } }
    @keyframes step-flow-32 { 0%, 22.05% { display: none; } 22.06% { display: inline; } 22.75% { display: none; } 100% { display: none; } }
    @keyframes step-flow-33 { 0%, 22.74% { display: none; } 22.75% { display: inline; } 23.44% { display: none; } 100% { display: none; } }
    /* 23.44%（約3.5秒時点）〜 93.10%（13.5秒時点）まで10秒間、完成文を表示キープ */
    @keyframes step-flow-34 { 0%, 23.43% { display: none; } 23.44% { display: inline; } 93.10% { display: none; } 100% { display: none; } }
    /* 【新演出】93.10% 〜 96.55%（0.5秒間）全選択（背景青反転）状態 */
    @keyframes step-flow-35 { 0%, 93.09% { display: none; } 93.10% { display: inline; } 96.55% { display: none; } 100% { display: none; } }
    /* 【新演出】96.55% 〜 100.0%（0.5秒間）一括削除（テキストなし、初期カーソルのみ点滅）状態 */
    @keyframes step-flow-36 { 0%, 96.54% { display: none; } 96.55% { display: inline; } 100.00% { display: inline; } }

    /* 各ステップにアニメーションを割り当て（合計14.5sに変更） */
    .s-0  { animation: step-flow-0 14.5s infinite; }   .s-1  { animation: step-flow-1 14.5s infinite; }
    .s-2  { animation: step-flow-2 14.5s infinite; }   .s-3  { animation: step-flow-3 14.5s infinite; }
