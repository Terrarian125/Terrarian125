    .s-22 { animation: step-flow-22 14.5s infinite; }  .s-23 { animation: step-flow-23 14.5s infinite; }
    .s-24 { animation: step-flow-24 14.5s infinite; }  .s-25 { animation: step-flow-25 14.5s infinite; }
    .s-26 { animation: step-flow-26 14.5s infinite; }  .s-27 { animation: step-flow-27 14.5s infinite; }
    .s-28 { animation: step-flow-28 14.5s infinite; }  .s-29 { animation: step-flow-29 14.5s infinite; }
    .s-30 { animation: step-flow-30 14.5s infinite; }  .s-31 { animation: step-flow-31 14.5s infinite; }
    .s-32 { animation: step-flow-32 14.5s infinite; }  .s-33 { animation: step-flow-33 14.5s infinite; }
    .s-34 { animation: step-flow-34 14.5s infinite; }  .s-35 { animation: step-flow-35 14.5s infinite; }
    .s-36 { animation: step-flow-36 14.5s infinite; }
  </style>

